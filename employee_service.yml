spring:
  application:
    name: employee_service

  datasource:
    url: jdbc:h2:mem:employee_db
    driver-class-name: org.h2.Driver
    username: sa
    password: "00000000"

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  h2:
    console:
      enabled: true
server:
  port: 8082

management:
  endpoints:
    web:
      exposure:
        include: health,info
eureka:
  client:
    enabled: true
    service-url:
      defaultZone: http://eureka_server:8761/eureka
